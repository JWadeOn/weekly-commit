# Production-like Compose file (no mock OAuth).
# Copy .env.example to .env.prod and set real OAuth + secrets. Never commit .env.prod.
#
# Usage:
#   export $(grep -v '^#' .env.prod | xargs) && docker compose -f docker-compose.prod.yml up --build
#
# Or use a reverse proxy (see docs/DEPLOYMENT.md) and set REMOTE_URL / VITE_API_URL for host/remote builds.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: weeklycommit
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d weeklycommit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/weeklycommit
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_ISSUER_URI: ${OAUTH_ISSUER_URI}
      OAUTH_JWK_SET_URI: ${OAUTH_JWK_SET_URI}
      OAUTH_AUTHORIZATION_URI: ${OAUTH_AUTHORIZATION_URI}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      FRONTEND_URL: ${FRONTEND_URL}
    restart: unless-stopped
    ports:
      - "8080:8080"

  remote:
    build:
      context: ./remote
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "3001:3001"

  host:
    build:
      context: ./host
      args:
        REMOTE_URL: ${REMOTE_URL}
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - remote
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  postgres_data:
