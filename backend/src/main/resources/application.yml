spring:
  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          oidc:
            provider: oidc-provider
            client-id: ${OAUTH_CLIENT_ID:weekly-commit-client}
            client-secret: ${OAUTH_CLIENT_SECRET:client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/oidc}
            scope: openid, email, profile
            client-name: Weekly Commit
        provider:
          oidc-provider:
            # issuer-uri uses the Docker-internal hostname so Spring can fetch discovery
            # at startup and token iss claims match. Browser auth redirect is overridden
            # below via authorization-uri to use the host-accessible localhost:8090.
            issuer-uri: ${OAUTH_ISSUER_URI:http://mock-oauth2}
            authorization-uri: ${OAUTH_AUTHORIZATION_URI:http://localhost:8090/connect/authorize}
            jwk-set-uri: ${OAUTH_JWK_SET_URI:http://mock-oauth2/.well-known/openid-configuration/jwks}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: lax
        http-only: true

jwt:
  secret: ${JWT_SECRET}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
