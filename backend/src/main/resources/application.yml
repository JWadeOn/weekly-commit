spring:
  threads:
    virtual:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  security:
    oauth2:
      client:
        registration:
          oidc:
            provider: oidc-provider
            client-id: ${OAUTH_CLIENT_ID:weekly-commit-client}
            client-secret: ${OAUTH_CLIENT_SECRET:client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/oidc}
            scope: openid, email, profile
            client-name: Weekly Commit
        provider:
          oidc-provider:
            # Local dev default: localhost:8090. Docker overrides via OAUTH_ISSUER_URI=http://mock-oauth2.
            # authorization-uri is always browser-facing (localhost:8090) to avoid Docker hostname leaking to browser.
            issuer-uri: ${OAUTH_ISSUER_URI:http://localhost:8090}
            authorization-uri: ${OAUTH_AUTHORIZATION_URI:http://localhost:8090/connect/authorize}
            jwk-set-uri: ${OAUTH_JWK_SET_URI:http://localhost:8090/.well-known/openid-configuration/jwks}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/weeklycommit}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: lax
        http-only: true

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-change-in-production}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  # Comma-separated list of origins allowed for CORS (e.g. host + remote in production)
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
